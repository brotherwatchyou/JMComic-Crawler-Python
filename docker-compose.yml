services:
  jmcomic:
    build: .
    container_name: jmcomic
    ports:
      - "${JM_WEBUI_PORT:-9801}:9801"
    volumes:
      - ${JM_DATA_DIR:-jmcomic_data}:/data
      - ${JM_DOWNLOAD_DIR:-jmcomic_downloads}:/downloads
      # 可选：挂载自定义配置文件
      # - ./my_option.yml:/app/assets/option/option_docker.yml:ro
    environment:
      - JM_DATA_DIR=/data
      - JM_DOWNLOAD_DIR=/downloads
      - JM_WEBUI_PASSWORD=${JM_WEBUI_PASSWORD:-}
    restart: unless-stopped

volumes:
  jmcomic_data:
    driver: local
  jmcomic_downloads:
    driver: local
